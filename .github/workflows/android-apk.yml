name: Build Android APK

on:
  push:
    branches: [ claude/nice-planck-ZDr90 ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Generate Android platform files
        run: bash tool/setup_android.sh

      - name: Download on-device models
        run: bash tool/download-models.sh

      - name: Write asset list into pubspec
        run: python3 tool/generate-asset-list.py

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug 2>&1 | tee /tmp/build.log

      - name: Surface build error on failure
        if: failure()
        run: |
          echo "===== build log tail ====="
          tail -n 200 /tmp/build.log || true
          msg=$(tail -n 150 /tmp/build.log 2>/dev/null \
            | python3 -c "import sys;print(sys.stdin.read().replace('%','%25').replace('\r','').replace('\n','%0A'))")
          echo "::error title=flutter_build_failure::$msg"


      - name: Stage APK with a friendly name
        run: |
          apk=$(find build -name "app-debug.apk" -print -quit)
          [ -n "$apk" ] || { echo "No app-debug.apk found under build/"; find build -name '*.apk'; exit 1; }
          echo "Found APK at: $apk"
          cp "$apk" speaker-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speaker-mobile-debug-apk
          path: mobile/speaker-android.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android build (latest)
          body: |
            On-device Speaker test app — streaming ASR + TTS, fully local.
            Download **speaker-android.apk** below on your phone and tap to install
            (enable *Install unknown apps* if prompted).
          files: mobile/speaker-android.apk
          make_latest: true

      - name: Download link
        if: always()
        run: |
          {
            echo "## Speaker on-device APK"
            echo ""
            echo "**Direct download (open on your phone):**"
            echo ""
            echo "https://github.com/${{ github.repository }}/releases/download/android-latest/speaker-android.apk"
            echo ""
            echo "Or browse all builds: https://github.com/${{ github.repository }}/releases/tag/android-latest"
            echo ""
            echo "Runs ASR and TTS **fully on-device** — no network at runtime."
          } >> "$GITHUB_STEP_SUMMARY"
