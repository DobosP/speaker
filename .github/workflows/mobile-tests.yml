name: Mobile tests

# Runs the Dart half of the cross-language golden contract (and any other Flutter
# unit tests) so the mobile shell can't drift from the Python core. Triggered
# only when the mobile app or the shared golden fixtures change. Pure Dart unit
# tests -- no emulator, no device, no model downloads.

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - 'tests/golden/**'
      - '.github/workflows/mobile-tests.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - 'tests/golden/**'
      - '.github/workflows/mobile-tests.yml'

permissions:
  contents: read

jobs:
  flutter-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze (compile-check the whole app, errors only)
        # flutter test only compiles imported test sources, so this is what
        # actually compile-checks lib/ (e.g. assistant.dart). Gate on analyzer
        # errors, not style lints.
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter unit tests (incl. the golden contract)
        run: flutter test
