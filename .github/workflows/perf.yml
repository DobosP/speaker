name: Perf benchmark

# Real-model latency benchmark on a fixed GitHub Actions CPU. Heavy (downloads
# Gemma GGUF + sherpa ONNX, cached between runs), so on PRs it is opt-in via the
# "perf" label; it also runs on every push to main (post-merge) and on manual
# dispatch. Every run uploads the report as an artifact and writes the headline
# table to the job summary; main/dispatch runs also publish the full HTML report
# to GitHub Pages: https://dobosp.github.io/speaker/ . A GitHub CPU is a
# repeatable baseline, not phone silicon -- read it as calibration against the
# specsim model (see tools/specsim), not an absolute phone number.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: device profile to benchmark
        default: phone
        type: string
      limit:
        description: max fixtures to run
        default: "12"
        type: string
  push:
    branches: [main]
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages publishes; don't cancel an in-flight deploy.
concurrency:
  group: perf-pages
  cancel-in-progress: false

jobs:
  bench:
    # PRs: only when the "perf" label is applied. Also runs on push (main) and
    # manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.label.name == 'perf'
    runs-on: ubuntu-latest
    env:
      PROFILE: ${{ github.event.inputs.profile || 'phone' }}
      LIMIT: ${{ github.event.inputs.limit || '12' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache downloaded models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            .cache/bench-models
          key: bench-models-${{ hashFiles('tools/bench/models.py', 'bench-models.json') }}
          restore-keys: |
            bench-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest huggingface_hub sherpa-onnx
          # Prefer a prebuilt CPU wheel so the job doesn't compile llama.cpp.
          pip install llama-cpp-python \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Run latency benchmark
        run: |
          python -m tools.bench \
            --profile "$PROFILE" \
            --fixtures tests/fixture_audio/virtual_real_world \
            --limit "$LIMIT" \
            --out test-reports/perf \
            ${{ hashFiles('bench-models.json') != '' && '--models-manifest bench-models.json' || '' }}

      - name: Build Pages site index
        run: |
          # Pages serves the report dir at the site root; add a landing page that
          # points at the just-built profile report.
          cat > test-reports/perf/index.html <<HTML
          <!doctype html><meta charset="utf-8">
          <title>Speaker perf reports</title>
          <body style="font:15px/1.6 system-ui,sans-serif;margin:3rem">
          <h1>Speaker real-model latency report</h1>
          <p>Latest run: <a href="./${PROFILE}/index.html">${PROFILE} profile</a></p>
          </body>
          HTML

      - name: Upload perf report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ env.PROFILE }}
          path: test-reports/perf
          if-no-files-found: warn

      - name: Upload Pages artifact
        # Only publish from main / manual runs -- never PR content.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: test-reports/perf

  real_model_tests:
    # Tier-2 real-weight CORRECTNESS over fixtures (ASR accuracy, partial->final
    # consistency, Smart-Turn, DTLN) -- the regressions the model-free logic suite
    # (tests.yml) cannot catch. Independent of the bench/deploy jobs so an ASR
    # regression alerts without blocking the perf-report publish. Same triggers as
    # bench (push to main, manual dispatch, or the "perf" label on a PR).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.label.name == 'perf'
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache sherpa models
        uses: actions/cache@v4
        with:
          path: pretrained_models/sherpa
          key: sherpa-models-${{ hashFiles('tools/setup_models.py') }}
          restore-keys: |
            sherpa-models-

      - name: Install dependencies
        run: pip install numpy pytest sherpa-onnx huggingface_hub requests

      - name: Download sherpa models (ASR + SenseVoice + Smart-Turn + DTLN)
        # Writes config.local.json with the model paths; the real_model tests opt
        # back into that overlay (SPEAKER_NO_LOCAL_CONFIG=0) per-test.
        run: python -m tools.setup_models --sense-voice --turn-model --aec-model

      - name: Run the real_model test tier
        run: python -m pytest tests -q -m "real_model or recorded"

  deploy:
    needs: bench
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Link the published report in the run summary
        run: |
          echo "### Published perf report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
