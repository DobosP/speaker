name: Publish Gemma model

# Fetches the license-gated Gemma 3 1B (LiteRT, int4) once and republishes it as
# a PUBLIC release asset, so the phone app can download it on first launch with
# no HuggingFace token. Run this manually after setting the HF_TOKEN secret.
#
# Requires repo secret HF_TOKEN: a HuggingFace access token on an account that
# has accepted the Gemma license at huggingface.co/litert-community/Gemma3-1B-IT.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-model:
    runs-on: ubuntu-latest
    env:
      HF: ${{ secrets.HF_TOKEN }}
      REPO_ID: litert-community/Gemma3-1B-IT
      ASSET: Gemma3-1B-IT-q4.litertlm
    steps:
      - name: Check token is configured
        run: |
          if [ -z "$HF" ]; then
            echo "::error title=missing_secret::HF_TOKEN secret is not set."
            exit 1
          fi

      - name: Inspect repo and pick model file
        run: |
          set +e
          info=$(curl -s -H "Authorization: Bearer $HF" "https://huggingface.co/api/models/$REPO_ID")
          gated=$(printf '%s' "$info" | jq -r '.gated // "unknown"')
          models=$(printf '%s' "$info" | jq -r '.siblings[].rfilename | select(endswith(".litertlm") or endswith(".task"))' 2>/dev/null)
          flat=$(printf '%s' "$models" | tr '\n' ' ')
          echo "gated=$gated"
          echo "model files: $flat"
          echo "::warning title=hf_inspect::gated=$gated files=$flat"
          # Who does this token belong to, and what scope does it have? This
          # distinguishes "license not accepted" from "token lacks gated scope".
          who=$(curl -s -H "Authorization: Bearer $HF" https://huggingface.co/api/whoami-v2)
          uname=$(printf '%s' "$who" | jq -r '.name // .error // "unknown"')
          role=$(printf '%s' "$who" | jq -r '.auth.accessToken.role // .auth.type // "?"')
          echo "::warning title=hf_whoami::user=$uname token_role=$role"
          pick=$(printf '%s\n' "$models" | grep '\.litertlm$' | grep -i q4 | head -1)
          [ -z "$pick" ] && pick=$(printf '%s\n' "$models" | grep '\.litertlm$' | head -1)
          [ -z "$pick" ] && pick=$(printf '%s\n' "$models" | head -1)
          if [ -z "$pick" ]; then
            echo "::error title=no_model_file::No .litertlm/.task found or repo inaccessible (gated=$gated) — token may lack Gemma license access (accept it at huggingface.co/$REPO_ID)."
            exit 1
          fi
          echo "picked: $pick"
          echo "PICK=$pick" >> "$GITHUB_ENV"
          case "$pick" in
            *.task) echo "ASSET=Gemma3-1B-IT-q4.task" >> "$GITHUB_ENV" ;;
          esac

      - name: Download model
        run: |
          set +e
          url="https://huggingface.co/$REPO_ID/resolve/main/$PICK"
          code=$(curl -s -L -o "$ASSET" -w '%{http_code}' -H "Authorization: Bearer $HF" "$url")
          bytes=$(stat -c%s "$ASSET" 2>/dev/null || echo 0)
          echo "::warning title=download::file=$PICK http=$code bytes=$bytes"
          ls -lh "$ASSET" || true
          if [ "$code" != "200" ] || [ "$bytes" -lt 100000000 ]; then
            # Capture HuggingFace's own refusal reason so the cause is explicit.
            hdr=$(curl -s -I -L -H "Authorization: Bearer $HF" "$url" \
                  | grep -iE 'x-error|HTTP/' | tr '\n' '|')
            body=$(head -c 200 "$ASSET" 2>/dev/null | tr '\n' ' ')
            echo "::error title=bad_download::http=$code bytes=$bytes hdr=[$hdr] body=[$body]"
            exit 1
          fi
          echo "Downloaded $PICK -> $ASSET ($bytes bytes)"

      - name: Publish to public release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gemma-model
          name: Gemma 3 1B (on-device model)
          body: |
            License-gated Gemma 3 1B (LiteRT int4) republished for on-device use
            by the Speaker mobile app. Subject to the Gemma Terms of Use.
          files: ${{ env.ASSET }}
          make_latest: false
