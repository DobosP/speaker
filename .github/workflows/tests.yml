name: Tests

# Self-check CI: runs the logic test suite on every push to main and every PR,
# so regressions are caught before merge. Uses no audio/model deps (those tests
# are skipped here, matching the local fast path).

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        # numpy: the audio fixtures are .npy and the replay/bench tests build
        # waveforms with it. Still a pure-Python-friendly dep -- no audio/models.
        run: pip install pytest numpy

      - name: Run test suite (no audio/model deps)
        run: |
          python -m pytest tests -q \
            --ignore=tests/test_livekit_audio.py \
            --ignore=tests/test_livekit_engine.py
