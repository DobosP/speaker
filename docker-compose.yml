# Speaker remote host stack. Keeps every capability (live voice + text /chat) but
# light and hardened. The LLM is your HOST-LOCAL Ollama -- there is no Ollama
# container here.
#
# Prereqs on the host:
#   - Ollama running:  `ollama serve`  (or the systemd service)
#   - Models pulled:   `ollama pull gemma3:12b && ollama pull gemma3:4b`
#   - NVIDIA driver (Ollama uses the GPU directly on the host)
#
# First run:
#   cp docker/.env.example .env        # set LIVEKIT_URL to your LAN IP for remote laptops
#   docker compose up -d --build
#   # open http://<this-host>:8080
#
# Fast dev loop (bind-mount source, no rebuild on edits, hot reload):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Networking is host mode (Linux): most efficient for WebRTC media and reaches
# host-local Ollama at localhost:11434 with no extra config. Isolation instead
# comes from least privilege below: non-root, all capabilities dropped,
# no-new-privileges, a read-only root filesystem, and read-only model access.
#
# Native vs remote (latency): this stack is for reaching the brain from OTHER
# devices (browser/phone) over WebRTC. If you are sitting AT the GPU box, the
# lowest-latency path is the native run `python -m core --engine sherpa` -- no
# WebRTC hop. Streaming token output + sentence-batched TTS + barge-in work on
# both paths (tts.streaming is on in config.json).

x-hardening: &hardening
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-speaker: &speaker
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: speaker-remote:latest
  network_mode: host
  user: "10001:10001"
  environment: &speaker-env
    LIVEKIT_URL: ${LIVEKIT_URL:-ws://127.0.0.1:7880}
    # No fallback: leave these unset and the stack fails fast at startup rather
    # than silently running on the well-known dev credentials. Set both in .env.
    LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}
    LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}
    # Empty -> the app defaults to localhost:11434 (host Ollama via host net).
    OLLAMA_HOST: ${OLLAMA_HOST:-}
    # Empty -> use the config.json default ("30m"). "-1" keeps models resident.
    OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-}
    HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    # OpenRouter (P3): one US-hosted aggregator key for the cloud thinking tier.
    # Same default-empty shape -- a missing key just disables the OpenRouter
    # presets; the sensitivity-routed chain falls through to whatever else is set.
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    # PRC opt-in (P3, Locked Decision 2). Default OFF: US-hosted chains are the
    # default and the PRC-hosted DeepSeek/Moonshot presets (host=CN) are dropped.
    # Set ALLOW_PRC=1 to opt in; the entrypoint maps it to llm.cloud.allow_prc.
    ALLOW_PRC: ${ALLOW_PRC:-}

services:
  # Self-hosted WebRTC SFU. This default (non-dev) path requires real keys:
  # provide them via LIVEKIT_KEYS (key: secret pairs) so the SFU never falls
  # back to the well-known devkey/secret. For a throwaway local loop use the
  # dev overlay (docker-compose.dev.yml), which re-enables --dev explicitly.
  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    environment:
      # "<key>: <secret>" -- must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET.
      # No fallback literals: if unset the SFU starts with no usable key and the
      # worker/token-server (which carry a hard :? check on the same vars) abort,
      # so the stack fails fast instead of silently running on dev credentials.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: ["--bind", "0.0.0.0"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # One-shot: download sherpa ASR/VAD/TTS models into the volume (idempotent).
  # Runs as root and read-write ONLY so it can populate the shared model dir;
  # every long-lived service below mounts that dir read-only.
  models:
    <<: *speaker
    user: "0:0"
    entrypoint: ["python", "/usr/local/bin/download_models.py"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - models:/models
    restart: "no"

  # The brain: joins the LiveKit room, runs sherpa STT/TTS + the host-Ollama LLM.
  worker:
    <<: [*speaker, *hardening]
    command: ["python", "-m", "remote.worker"]
    volumes:
      - models:/models:ro
    depends_on:
      models:
        condition: service_completed_successfully
      livekit:
        condition: service_started
    restart: unless-stopped

  # Mints LiveKit tokens, serves the web client, and exposes a text /chat.
  token-server:
    <<: [*speaker, *hardening]
    command: ["python", "-m", "remote.token_server"]
    volumes:
      - models:/models:ro
    restart: unless-stopped

volumes:
  models:
