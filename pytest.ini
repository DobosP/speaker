[pytest]
addopts = --strict-markers
testpaths = tests
# Per-test hang guard (pytest-timeout, a dev dep in requirements-dev.txt): turns a
# deadlock/hang from the concurrency code into a failed test, not a wedged run.
# Set as INI options (NOT addopts) so a runtime-only `pytest` WITHOUT the plugin
# still runs -- an unknown ini key is ignored, whereas an unknown `--timeout` CLI
# arg would hard-fail the whole run (and break CI that installs only runtime deps).
# The `thread` method tolerates the app threads. Parallel stays opt-in
# (`pytest -n auto`), deliberately not in addopts.
timeout = 60
timeout_method = thread
markers =
    smoke: fastest import/config/schema checks
    dev: critical fast tests for everyday TDD
    audio: deterministic audio, VAD, barge-in, replay, and conversation tests
    recorded: recorded-session replay tests
    discovery: failure-discovery tests that may intentionally fail until bugs are fixed
    backend: optional backend/model integration tests
    slow: tests expected to take noticeably longer than the dev stage
    hardware: tests that may require real audio hardware or host devices
    network: tests that may require network access or downloaded assets
    llm: tests that require a local or remote LLM service
    e2e: full end-to-end CLI/process tests (subprocess the real `python -m core`)
    real_model: Tier 2 -- needs real trained weights over FIXTURES, no sound card (sherpa ASR/TTS, two-pass final, Smart-Turn ONNX, replay regressions). Self-skips when models are absent. Run via `python tools/run_tests.py real_model`.
    live_output: Tier 3 -- makes SOUND on real speakers/mic (live_session acoustic, real_usage, echo_probe, voice_id_check). NEVER runs automatically: gated by SPEAKER_LIVE=1 (see conftest). Run via `python tools/run_tests.py live`.
