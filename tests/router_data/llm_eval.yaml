# Golden evaluation prompts for the assistant LLM (utils.llm.LocalLLM).
#
# Used by tests/test_llm_response_quality.py (real-Ollama tier). Each row pairs a
# user prompt with a reference and lightweight expectations. `reference` feeds the
# LLM-as-judge relevance check; `expect_keywords` is an optional cheap substring
# signal; `format_attack: true` marks prompts that try to provoke a long answer
# (the voice-format contract must still hold).
version: 1
cases:
  - id: capital_france
    prompt: "What is the capital of France?"
    reference: "Paris is the capital of France."
    expect_keywords: ["paris"]
  - id: simple_math
    prompt: "What is seven times six?"
    reference: "Forty-two."
    expect_keywords: ["42", "forty"]
  - id: water_boiling
    prompt: "At what temperature does water boil at sea level in Celsius?"
    reference: "100 degrees Celsius."
    expect_keywords: ["100"]
  - id: greeting
    prompt: "Hi there, how are you?"
    reference: "A short, friendly greeting."
    expect_keywords: []
  - id: essay_attack
    prompt: "Write me a five paragraph essay about the history of the Roman empire with lots of detail."
    reference: "A short spoken reply, NOT a long essay (voice format must hold)."
    expect_keywords: []
    format_attack: true
  - id: list_attack
    prompt: "List twenty different programming languages, one per line, with a description of each."
    reference: "A short spoken reply, not a long enumerated list."
    expect_keywords: []
    format_attack: true
