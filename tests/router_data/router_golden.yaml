# Golden regression table for utils.conversation_router.ConversationRouter.
#
# Each row is a trusted (input -> expected decision) pair. Run as a parametrized
# CI gate by tests/test_router_golden.py. Rows tagged `gap` pin CURRENT (buggy)
# behavior on purpose so a regression is caught; the desired behavior is tracked
# by the xfail relations in test_router_metamorphic.py (X2/X3).
version: 1
layer: conversation_router
default_capabilities: ["system.time", "debug.echo"]
cases:
  - id: filler_empty
    transcript: "  ...  "
    expect_action: ignore
    expect_reason: empty_or_filler
    tags: [filler, edge]
  - id: filler_uh
    transcript: "uh"
    expect_action: ignore
    expect_reason: empty_or_filler
    tags: [filler]
  - id: stop_bare
    transcript: "stop"
    expect_action: stop_output
    expect_reason: stop_output_phrase
    tags: [control]
  - id: stop_trailing_words
    transcript: "stop talking now please"
    expect_action: stop_output
    tags: [control, messy]
  - id: stop_asr_repeat
    transcript: "stop stop talking"
    expect_action: stop_output
    tags: [control, messy]
  - id: cancel
    transcript: "cancel that"
    expect_action: stop_output
    tags: [control]
  - id: quit
    transcript: "quit"
    expect_action: shutdown
    expect_reason: shutdown_phrase
    tags: [control]
  - id: shut_down_two_words
    transcript: "shut down"
    expect_action: shutdown
    tags: [control]
  - id: goodbye
    transcript: "goodbye"
    expect_action: shutdown
    tags: [control]
  - id: near_miss_started
    transcript: "started"
    expect_action: llm
    expect_reason: llm_fallback
    tags: [near_miss]
  - id: time_question
    transcript: "What time is it?"
    expect_action: capability
    expect_capability: system.time
    expect_reason: capability_time
    tags: [capability]
  - id: time_word
    transcript: "time"
    expect_action: capability
    expect_capability: system.time
    tags: [capability]
  - id: debug_echo
    transcript: "debug echo hello world"
    expect_action: capability
    expect_capability: debug.echo
    expect_payload: {text: "hello world"}
    tags: [capability]
  - id: open_question
    transcript: "tell me a joke"
    expect_action: llm
    tags: [llm]
  - id: partial_stop_is_control
    transcript: "stop"
    is_partial: true
    expect_action: stop_output
    tags: [control, partial]
  - id: partial_capability_ignored
    transcript: "what time is it"
    is_partial: true
    expect_action: ignore
    tags: [partial, capability]
  # ── Pinned gaps (current behavior; desired behavior tracked by X2/X3) ──
  - id: leading_filler_gap
    transcript: "please stop"
    expect_action: llm   # GAP B2: prefix-match misses leading filler (want stop_output)
    tags: [gap, messy]
  - id: romanian_gap
    transcript: "opreste"
    expect_action: llm   # GAP B3: router is English-only (want stop_output)
    tags: [gap, bilingual]
  - id: time_without_capability
    transcript: "what time is it"
    capabilities: []
    expect_action: llm   # B5: capability gracefully absent -> falls back to LLM
    tags: [capability, edge]
