<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Restrictive CSP: everything loads same-origin. script-src is 'self'
       only (no inline JS — see app.js); the inline <style> below is allowed
       via 'unsafe-inline' on style-src only. connect-src permits same-origin
       (/chat, /token) plus the operator-configured LiveKit server over wss:,
       and media/blob for WebRTC audio playback. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; media-src 'self' blob: mediastream:; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <title>Speaker — remote</title>
  <!-- LiveKit browser SDK (UMD global: LivekitClient).
       Vendored same-origin and pinned to v2.19.0 with Subresource Integrity
       (security-6). Refresh by re-downloading the same pinned version from
       https://cdn.jsdelivr.net/npm/livekit-client@2.19.0/dist/livekit-client.umd.min.js
       and recomputing the sha384 integrity hash. -->
  <script src="livekit-client.umd.min.js"
          integrity="sha384-4mvXH43KU6z6VglCgy9AF2YBxW2U6M++EIf5rAAKg/BDjOcaZ/zwG3cSjGdV4+MN"
          crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; height: 50vh; overflow-y: auto; }
    .you { color: #0a58ca; } .bot { color: #198754; } .sys { color: #888; font-style: italic; }
    .row { display: flex; gap: .5rem; margin-top: .75rem; }
    input[type=text] { flex: 1; padding: .5rem; } button { padding: .5rem .9rem; cursor: pointer; }
    .line { margin: .25rem 0; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Speaker — remote</h1>
  <p class="sys">Type to chat (uses /chat), or connect your mic for live voice (uses LiveKit).</p>
  <div id="log"></div>
  <div class="row">
    <input id="msg" type="text" placeholder="Type a message and press Enter…" autocomplete="off" />
    <button id="send">Send</button>
    <button id="voice">Connect voice</button>
  </div>

  <!-- App logic lives in a same-origin file so the page runs under a strict
       script-src 'self' CSP (no inline JS). -->
  <script src="app.js"></script>
</body>
</html>
